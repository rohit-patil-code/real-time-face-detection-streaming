version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: face_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: facedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: face_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/temp_uploads:/app/temp_uploads
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/facedb
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
